{% extends 'base.html' %} 

{% block title %}Player - MoodMusic{% endblock %}

{% block extra_css %}

<style>
  .player-container { background: linear-gradient(135deg, #6366f1, #764ba2 100%); 
    border-radius: 20px;
     padding: 25px; color: white; text-align: center;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2); max-height: 85vh; overflow: hidden;
       display: flex; flex-direction: column; } 
       .album-art {
         width: 200px; 
         height: 200px; 
         margin: 0 auto 15px; 
         border-radius: 15px;
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
           overflow: hidden;
            object-fit: cover; } 
        .song-meta {
             margin-bottom: 15px; 
             }
        .song-title { 
            font-size: 1.5rem; 
            font-weight: 700;
             margin-bottom: 4px; 
             word-wrap: break-word; } 
        .song-artist { 
            font-size: 0.95rem;
             opacity: 0.85;
              margin-bottom: 3px; } 
        .song-mood {
             font-size: 0.8rem;
              opacity: 0.7; 
              text-transform: capitalize; } 
        .player-controls { 
            display: flex; 
            justify-content: center; 
            align-items: center;
             gap: 10px; 
             margin: 15px 0; 
             flex-wrap: wrap; }
        .player-button {
             background: rgba(255, 255, 255, 0.2);
              border: 2px solid rgba(255, 255, 255, 0.4);
               color: white;
                padding: 8px 16px; 
                border-radius: 50px;
                 font-size: 0.9rem;
                  cursor: pointer;
                   transition: all 0.3s ease;
                    display: flex;
                     align-items: center; gap: 6px;
                      white-space: nowrap; } 
        .player-button:hover {
             background: rgba(255, 255, 255, 0.3);
              transform: scale(1.05); } 
        .player-button:disabled {
             opacity: 0.5; cursor: not-allowed; } 
        .player-button.primary {
             background: rgba(255, 255, 255, 0.9);
              color: #6366f1; font-weight: 600; }
        .player-button.primary:hover { 
            background: white; } 
        .player-button.like-btn.liked {
             background: #ec4899; 
             border-color: #ec4899; } 
        .song-source-badge {
             display: inline-block;
              font-size: 0.7rem; 
              background: rgba(255, 255, 255, 0.2); 
              padding: 3px 8px;
               border-radius: 20px;
                margin-top: 5px;
                 text-transform: uppercase;
                  letter-spacing: 0.5px; } 
        .audio-player-note { 
            font-size: 0.85rem;
             opacity: 0.8;
              margin-bottom: 10px;
               padding: 8px;
                background: rgba(255, 255, 255, 0.1);
                 border-radius: 8px; } 
        .lyrics-container { 
            margin-top: 20px;
             padding: 15px; 
             background: rgba(255, 255, 255, 0.1);
              border-radius: 10px; 
              max-height: 250px; 
              overflow-y: auto; 
              text-align: left; } 
        .lyrics-title { 
            font-size: 0.9rem;
             font-weight: 600;
              margin-bottom: 10px; 
              text-transform: uppercase;
               letter-spacing: 1px;
                opacity: 0.9; } 
        .lyrics-content { 
            font-size: 0.85rem; 
            line-height: 1.6; 
            white-space: pre-wrap; 
            word-wrap: break-word; } 
        .lyrics-link {
             display: inline-block; 
             margin-top: 10px;
              padding: 6px 12px; 
              background: rgba(255, 255, 255, 0.2); 
              border-radius: 20px; 
              font-size: 0.75rem;
               text-decoration: none;
                color: white;
                 transition: all 0.3s ease; } 
        .lyrics-link:hover { 
            background: rgba(255, 255, 255, 0.3); } 
        .progress-container { 
            background: rgba(255, 255, 255, 0.1);
             border-radius: 10px; 
             padding: 12px; 
             margin: 12px 0;
              backdrop-filter: blur(5px); }
        .progress-bar { 
            width: 100%;
             height: 5px;
              background: rgba(255, 255, 255, 0.2); 
              border-radius: 5px; 
              cursor: pointer; 
              position: relative; 
              overflow: hidden; }
        .progress-fill {
             height: 100%;
              background: linear-gradient(90deg, #10b981, #14b8a6);
               border-radius: 5px;
                width: 0%;
                 transition: width 0.1s linear; }
        .time-display { 
            display: flex; 
            justify-content: space-between;
             margin-top: 6px; 
             font-size: 0.75rem; 
             opacity: 0.8; }
        .hidden-player { 
            width: 1px; 
            height: 1px;
             position: absolute; 
             left: -9999px; } 
        .back-button { 
            display: inline-block;
             margin-bottom: 15px; } 
        .back-button a {
             background: rgba(255, 255, 255, 0.2);
              color: white;
               padding: 8px 16px;
                border-radius: 50px; 
                text-decoration: none;
                 transition: all 0.3s ease;
                  display: inline-flex;
                   align-items: center;
                    gap: 6px; 
                    font-size: 0.9rem; }
        .back-button a:hover { 
            background: rgba(255, 255, 255, 0.3); 
            transform: translateX(-3px); }
        .volume-control { 
            display: flex;
             align-items: center; 
             justify-content: center;
              gap: 8px;
               margin-top: 12px; } 
        .volume-slider {
             width: 120px; 
             height: 4px; 
             border-radius: 5px;
              background: rgba(255, 255, 255, 0.2); 
              outline: none; -webkit-appearance: none; }
        .volume-slider::-webkit-slider-thumb { 
            -webkit-appearance: none;
             appearance: none; 
             width: 14px;
              height: 14px;
               border-radius: 50%;
                background: white; cursor: pointer; } 
        .volume-slider::-moz-range-thumb { 
            width: 14px; 
            height: 14px; 
            border-radius: 50%; 
            background: white; 
            cursor: pointer;
             border: none; } 
        .volume-icon { 
            font-size: 0.8rem; }
             @media (max-width: 576px) { 
        .player-container { padding: 20px; }
        .album-art { width: 150px; height: 150px; }
        .song-title { font-size: 1.2rem; } 
        .player-button { padding: 6px 12px; font-size: 0.8rem; } }
         </style> 
          {% endblock %}
          {% block content %} 
         <div class="container" style="max-width: 600px; padding: 15px 0;"> 
            <div class="back-button"> <a href="{% url 'emotion_detection' %}">
                 <i class="fas fa-arrow-left"></i> Back </a> 
       </div>

<div class="container" style="max-width:600px;">

    <div class="player-container">

        <img src="{% if song.thumbnail_image %}{{ song.thumbnail_image.url }}{% else %}{{ song.thumbnail_url }}{% endif %}"
             class="album-art"
             onerror="this.src='https://via.placeholder.com/200'">

        <h4>{{ song.title }}</h4>
        <p>{{ song.artist }}</p>

        <!-- CONTROLS -->
        <div class="player-controls">
            <button class="player-button"
                    onclick="skipPrevious()"
                    {% if not prev_song %}disabled{% endif %}>
                ⏮ Prev
            </button>

            <button class="player-button primary"
                    id="playPauseBtn"
                    onclick="togglePlayPause()">
                ▶ Play
            </button>

            <button class="player-button"
                    onclick="skipNext()"
                    {% if not next_song %}disabled{% endif %}>
                ⏭ Next
            </button>
        </div>

        <!-- PROGRESS BAR -->
        <div class="progress-container">
            <div class="progress-bar" onclick="seekAudio(event)">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <!-- LIKE -->
        <button class="player-button like-btn {% if is_liked %}liked{% endif %}"
                onclick="toggleLike()">
            {% if is_liked %}❤️ Liked{% else %}🤍 Like{% endif %}
        </button>

        <!-- 🔊 VOLUME BAR -->
        <div class="volume-control">
            <span>🔉</span>
            <input type="range"
                   min="0"
                   max="100"
                   value="70"
                   class="volume-slider"
                   oninput="setVolume(this.value)">
            <span>🔊</span>
        </div>

    </div>

    <!-- AUDIO -->
    <audio id="audioPlayer" class="hidden-player"
           src="{{ song.audio_file.url }}"></audio>

</div>

<script>
let audioPlayer = document.getElementById("audioPlayer");
let playPauseBtn = document.getElementById("playPauseBtn");
let progressFill = document.getElementById("progressFill");
let currentTimeEl = document.getElementById("currentTime");
let durationEl = document.getElementById("duration");

audioPlayer.volume = 0.7;

let prevSongId = {% if prev_song %}{{ prev_song.id }}{% else %}null{% endif %};
let nextSongId = {% if next_song %}{{ next_song.id }}{% else %}null{% endif %};

function togglePlayPause() {
    if (audioPlayer.paused) {
        audioPlayer.play();
        playPauseBtn.innerHTML = "⏸ Pause";
    } else {
        audioPlayer.pause();
        playPauseBtn.innerHTML = "▶ Play";
    }
}

audioPlayer.addEventListener("timeupdate", () => {
    if (!audioPlayer.duration) return;
    let percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
    progressFill.style.width = percent + "%";
    currentTimeEl.innerText = formatTime(audioPlayer.currentTime);
    durationEl.innerText = formatTime(audioPlayer.duration);
});

function seekAudio(e) {
    let width = e.currentTarget.clientWidth;
    let clickX = e.offsetX;
    audioPlayer.currentTime = (clickX / width) * audioPlayer.duration;
}

function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    return m + ":" + (s < 10 ? "0" + s : s);
}

function skipPrevious() {
    if (prevSongId) {
        window.location.href =
            "{% url 'player' 999999 %}".replace("999999", prevSongId);
    }
}

function skipNext() {
    if (nextSongId) {
        window.location.href =
            "{% url 'player' 999999 %}".replace("999999", nextSongId);
    }
}

function setVolume(val) {
    audioPlayer.volume = val / 100;
}

function toggleLike() {
    fetch("{% url 'toggle_like' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify({ song_id: {{ song.id }} })
    }).then(() => location.reload());
}
</script>
{% endblock %}
